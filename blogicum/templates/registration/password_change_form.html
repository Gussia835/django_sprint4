{% extends "base.html" %}
{% load django_bootstrap5 %}

{% block content %}
    <div class="col d-flex justify-content-center">
        <div class="card col-4 m-3">
            <div class="card-header">
                Смена пароля
            </div>

            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {% bootstrap_form form %}
                    {% bootstrap_button type="submit" content="Сменить" %}
                </form>
            </div>
        </div>
    </div>
{% endblock %}
