{% extends "base.html" %}
{% load django_bootstrap %}

{% block content %}
    <div class="col d-flex justify-content-center">
        <div class="card" style="width:40rem">
            <div class="card-header">
                Восстановление пароля
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {% bootstrap_form form %}
                    {% bootstrap_button type="submit" content="Восстановить пароль" %}
                </form>
            </div>
        </div>
    </div>
{% endblock %}
